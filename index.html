<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Analyzer - Founder's Toolkit</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; padding: 20px; }
        .container { max-width: 750px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        h2 { text-align: center; color: #0d6efd; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #6c757d; font-style: italic; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #495057; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .btn-save { width: 100%; padding: 12px; background-color: #ffc107; color: #212529; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-bottom: 12px; transition: 0.2s; }
        .btn-save:hover { background-color: #e0a800; }
        .btn-analyze { width: 100%; padding: 12px; background-color: #198754; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-analyze:hover { background-color: #157347; }
        .loading-state { color: #0d6efd; font-weight: bold; text-align: center; display: none; margin-top: 15px; }
        .result-box { background: #f8f9fa; padding: 20px; border-left: 5px solid #198754; margin-top: 25px; border-radius: 4px; min-height: 60px; white-space: pre-wrap; line-height: 1.7; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Feedback Analyzer</h2>
    <div class="subtitle">Find patterns across all your feedback</div>

    <div class="form-group">
        <label for="problemText">Enter the Core Problem Statement:</label>
        <textarea id="problemText" rows="3">ubushyuhe bwamazi bunganiki mu bworozi bw'amafi</textarea>
    </div>

    <button class="btn-save" onclick="saveProblemLocally()">Save Problem</button>
    <button class="btn-analyze" onclick="runGroqAnalysis()">Analyze All Feedback</button>

    <div id="loadingText" class="loading-state">⏳ Groq AI (Llama 3.3) iri gusesengura amakuru n'ibitekerezo by'aborozi...</div>

    <h3 style="margin-top: 30px; border-bottom: 1px solid #dee2e6; padding-bottom: 8px;">AI Analysis Results:</h3>
    <div id="displayResults" class="result-box">Ibisubizo bya AI bizaza hano...</div>
</div>

<script>
function saveProblemLocally() {
    const problem = document.getElementById('problemText').value;
    localStorage.setItem('core_problem', problem);
    alert('Problem saved locally in Browser!');
}

async function runGroqAnalysis() {
    const problem = document.getElementById('problemText').value.trim();
    const displayResults = document.getElementById('displayResults');
    const loadingText = document.getElementById('loadingText');

    if(!problem) {
        alert("Banza wandike ikibazo cy'umworozi!");
        return;
    }

    // Guhumuriza umukoresha (Loading State) nka gutya isomo ribisaba
    loadingText.style.display = "block";
    displayResults.innerHTML = "";

    // Amakuru afatika ashingiye ku bworozi bw'amafi bwawe kugira ngo isesengura rye neza
    const sampleStakeholderFeedback = [
        "Umworozi 1: Ubushyuhe bukabije mu cyese butuma amafi adakura neza kandi amwe agapfa.",
        "Umworozi 2: Ntabwo dufite ibikoresho (sensors) bipfika ubushyuhe n'wongerezi (oxygen) mu mazi buri kanya.",
        "Umuguzi w'amafi: Amafi aza ari mato cyane mu gihe cy'izuba ryanze kuko amazi ashya cyane."
    ];

    try {
        const response = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                problem: problem,
                feedback: sampleStakeholderFeedback 
            })
        });

        const data = await response.json();
        loadingText.style.display = "none";

        if (data.error) {
            displayResults.innerHTML = `<span style='color: red; font-weight: bold;'>🚨 Ikosa: ${data.error}</span>`;
        } else {
            displayResults.innerHTML = `<span style='color: #198754; font-weight: bold;'>✨ Ibisubizo bishya bya AI (Llama 3.3):</span><br><br>${data.text}`;
        }
    } catch (err) {
        loadingText.style.display = "none";
        displayResults.innerHTML = `<span style='color: red; font-weight: bold;'>Ikosa rya Backend: ${err.message}</span>`;
    }
}
</script>

</body>
</html>
