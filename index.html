<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyamasheke Smart Monitor AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
        .container { max-width: 750px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin: 0 auto; }
        
        /* Header Section ifite select y'ururimi */
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e0e0e0; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: #0d47a1; margin: 0; font-size: 26px; font-weight: bold; }
        .subtitle { color: #555; margin-top: 5px; font-weight: 500; }
        select.lang-select { padding: 8px 12px; border-radius: 6px; border: 2px solid #0d47a1; font-weight: bold; background: white; color: #0d47a1; cursor: pointer; }

        /* Miterere y'Ibyese (Cards) nk'uko biri kuri ifoto yawe */
        .monitor-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .sensor-card { background: #eef2f7; padding: 25px 15px; border-radius: 12px; text-align: center; border: 1px solid #cfd8dc; }
        .sensor-card h3 { margin: 0 0 15px 0; color: #37474f; font-size: 16px; font-weight: 600; }
        .sensor-value { font-size: 32px; font-weight: bold; color: #0d47a1; margin-bottom: 5px; }
        .sensor-unit { font-size: 14px; color: #78909c; }
        
        .status-bar { text-align: center; font-weight: bold; color: #2e7d32; margin-bottom: 20px; background: #e8f5e9; padding: 12px; border-radius: 8px; border: 1px solid #c8e6c9; }
        
        /* Buto z'Ibyizandikwa */
        .action-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .btn-action { color: white; border: none; padding: 15px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.3s; text-align: center; }
        .btn-green { background-color: #2e7d32; }
        .btn-green:hover { background-color: #1b5e20; }
        .btn-orange { background-color: #e65100; }
        .btn-orange:hover { background-color: #b33f00; }
        
        .results-section { margin-top: 30px; padding: 20px; background: #fafafa; border-left: 6px solid #0d47a1; border-radius: 8px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        .results-section h3 { margin-top: 0; color: #37474f; }
        pre { white-space: pre-wrap; font-family: inherit; font-size: 15px; line-height: 1.6; color: #333; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div>
            <h1 id="title-text">Nyamasheke Smart Monitor AI 🐟</h1>
            <div id="subtitle-text" class="subtitle">Ubugenzuzi bwikora bw'Amazi mu gihe nyacyo (Real-Time Live Sensors)</div>
        </div>
        <div>
            <select id="langSelect" class="lang-select" onchange="changeLanguage()">
                <option value="rw">Kinyarwanda</option>
                <option value="en">English</option>
            </select>
        </div>
    </div>

    <div class="monitor-box">
        <div class="sensor-card">
            <h3 id="lbl-oxygen">DO (Oxygen)</h3>
            <div id="live-oxygen" class="sensor-value">--</div>
            <span class="sensor-unit">mg/L</span>
        </div>
        <div class="sensor-card">
            <h3 id="lbl-ph">Water pH</h3>
            <div id="live-ph" class="sensor-value">--</div>
            <span class="sensor-unit">0 - 14 pH</span>
        </div>
        <div class="sensor-card">
            <h3 id="lbl-temp">Temperature</h3>
            <div id="live-temp" class="sensor-value">--</div>
            <span class="sensor-unit">°C</span>
        </div>
    </div>

    <div id="monitor-status" class="status-bar">🔄 Ibyuma biri mu mazi biri gupima...</div>

    <div class="action-box">
        <button id="btn-analyze" class="btn-action btn-green" onclick="triggerAI('analyze')">Baza AI Isesengure Amazi Ari mu Cyese Kano Kanya</button>
        <button id="btn-lesson" class="btn-action btn-orange" onclick="triggerAI('lesson')">📚 Lifatire Isomo ry'Ubworozi (Training Lesson)</button>
    </div>

    <div class="results-section">
        <h3 id="lbl-results">✨ Umusaruro n'Ibutsa bya AI (Real-Time Analysis):</h3>
        <div id="displayResults">...</div>
    </div>
</div>

<script>
let currentOxygen = 5.3;
let currentPh = 7.4;
let currentTemp = 26.5;
let currentLang = 'rw';

const translations = {
    rw: {
        title: "Nyamasheke Smart Monitor AI 🐟",
        subtitle: "Ubugenzuzi bwikora bw'Amazi mu gihe nyacyo (Real-Time Live Sensors)",
        oxygen: "DO (Oxygen)",
        ph: "Water pH",
        temp: "Temperature",
        statusGood: "✅ STATUS: Amazi ameze neza kano kanya. Ubugenzuzi burakora...",
        statusBad: "🚨 WARNING: Ibipimo by'amazi byamanutse cyane!",
        btnAnalyze: "Baza AI Isesengure Amazi Ari mu Cyese Kano Kanya",
        btnLesson: "📚 Lifatire Isomo ry'Ubworozi (Training Lesson)",
        lblResults: "✨ Umusaruro n'Ibutsa bya AI (Real-Time Analysis):",
        aiThinking: "⏳ Llama 3.3 AI iri gusesengura amakuru mu Kinyarwanda..."
    },
    en: {
        title: "Nyamasheke Smart Monitor AI 🐟",
        subtitle: "Automated Water Monitoring in Real-Time (Live Sensors)",
        oxygen: "DO (Oxygen)",
        ph: "Water pH",
        temp: "Temperature",
        statusGood: "✅ STATUS: Water quality is optimal. Monitoring live...",
        statusBad: "🚨 WARNING: Water parameters dropped critically!",
        btnAnalyze: "Ask AI to Analyze Current Pond Water",
        btnLesson: "📚 Take Fish Farming Training Lesson",
        lblResults: "✨ AI Insights & Training Results (Real-Time Analysis):",
        aiThinking: "⏳ Llama 3.3 AI is analyzing data in English..."
    }
};

function changeLanguage() {
    currentLang = document.getElementById('langSelect').value;
    const t = translations[currentLang];
    
    document.getElementById('title-text').innerText = t.title;
    document.getElementById('subtitle-text').innerText = t.subtitle;
    document.getElementById('lbl-oxygen').innerText = t.oxygen;
    document.getElementById('lbl-ph').innerText = t.ph;
    document.getElementById('lbl-temp').innerText = t.temp;
    document.getElementById('btn-analyze').innerText = t.btnAnalyze;
    document.getElementById('btn-lesson').innerText = t.btnLesson;
    document.getElementById('lbl-results').innerText = t.lblResults;
    updateLiveSensors();
}

function updateLiveSensors() {
    // Ibyuma bipima umunota ku wundi byikora
    currentOxygen = (Math.random() * (6.5 - 3.8) + 3.8).toFixed(1);
    currentPh = (Math.random() * (8.2 - 5.8) + 5.8).toFixed(1);
    currentTemp = (Math.random() * (28.0 - 23.0) + 23.0).toFixed(1);

    document.getElementById('live-oxygen').innerText = currentOxygen;
    document.getElementById('live-ph').innerText = currentPh;
    document.getElementById('live-temp').innerText = currentTemp;

    const t = translations[currentLang];
    const statusBar = document.getElementById('monitor-status');

    if (currentOxygen < 4.5 || currentPh < 6.0) {
        statusBar.innerHTML = t.statusBad;
        statusBar.style.background = "#ffebee";
        statusBar.style.color = "#c62828";
        statusBar.style.border = "1px solid #ffcdd2";
    } else {
        statusBar.innerHTML = t.statusGood;
        statusBar.style.background = "#e8f5e9";
        statusBar.style.color = "#2e7d32";
        statusBar.style.border = "1px solid #c8e6c9";
    }
}

// Buri masegonda 4, sensors zizunguruka zenyine umunota ku wundi
setInterval(updateLiveSensors, 4000);
updateLiveSensors(); 

async function triggerAI(type) {
    const displayResults = document.getElementById('displayResults');
    displayResults.innerHTML = translations[currentLang].aiThinking;

    try {
        const response = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                oxygen: currentOxygen, 
                ph: currentPh, 
                temp: currentTemp,
                serviceType: type,
                lang: currentLang
            })
        });

        const data = await response.json();
        
        if (data.error) {
            displayResults.innerHTML = `🚨 Error: ${data.error}`;
        } else {
            displayResults.innerHTML = `<pre>${data.text}</pre>`;
        }
    } catch (err) {
        displayResults.innerHTML = `🚨 Backend Error: ${err.message}`;
    }
}
</script>

</body>
</html>
